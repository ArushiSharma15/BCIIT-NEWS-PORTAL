{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>bciit news project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/bciit.css' %}">
</head>
<body>

<h1 class="main-heading">STUDENT CLUBS</h1>

<div class="container mt-4">

    <div class="row">

        {% for club in clubs %}

        <div class="col-md-4">

            <div class="card custom-card">

                {% if club.images.all %}

                <img src="{{ club.images.all.0.image.url }}" class="card-img-top">

                {% endif %}

                <div class="card-body text-center">

                    <h5>{{ club.name }}</h5>

                    <a href="{% url 'club_detail' club.id %}" class="btn btn-primary">View Details</a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>


<div class="custom_bg">
<a class="btn btn-primary btn-lg" href="/" role="button">
    Back to Home Page
</a>
</div>
</body>
</html>
