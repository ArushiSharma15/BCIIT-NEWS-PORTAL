{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>bciit news project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/bciit.css' %}">
</head>
<body>
    <h1 class="main-heading">{{ teacher.name }}</h1>

    
    <div class="profile-main-container">
        
        
        <div class="profile-image-side">
            {% if teacher.images.all %}
                <img src="{{ teacher.images.all.0.image.url }}" class="gallery-img">
            {% endif %}
        </div>

        
        <div class="profile-description-side">
            <div class="faculty-description">
                {{ teacher.description }}
            </div>
        </div>
    </div>

    <div class="custom_bg">
        <a href="{% url 'faculty' %}" class="btn btn-primary">Back To Home Page </a>
    </div>
</body>

</html>
